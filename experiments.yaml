overrides:
  model:
    has_input_depths: true
    has_input_depth_masks: true
    enc_layer_norm: false
    enc_residual_layer_norm: false
    dec_layer_norm: false
    dec_residual_layer_norm: false
    standardize_inputs: false
  train:
    val_steps_interval: 50
    n_steps: 500000

    loss:
      weights: [2.0,2.0,0.7,1.5,1.0]
      perceptual:
        scheduler: constant
    optimizer:
      lr: 4e-4
      n_warmup_steps: 3000

setup:
  out_path: results/experiments/
  total_experiment_steps: 20000

experiments:
  lr:
    lr_2e-3_5k_warmup:
      train:
        optimizer:
          lr: 2e-3
          n_warmup_steps: 5000
    lr_1e-3:
      train:
        optimizer:
          lr: 1e-3
    lr_1e-4:
      train:
        optimizer:
          lr: 1e-4
    lr_1e-5:
      train:
        optimizer:
          lr: 1e-5
