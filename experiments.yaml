setup:
  out_path: results/experiments/
  # Can be either a number which will tell how many steps to run or a list of numbers which will make it run all experiments until that number then repeat for the next and so on
  total_experiment_steps: null #[10, 100, 1000, 5000, 10000, 20000]
  use_seed_model: false
  seed_model_steps: 40000
  # Whether to keep older checkpoints saved or to delete them when a newer one is saved
  delete_last_checkpoint: true

experiments:
  vdst:
    vdst:
      setup:
        seed: 42

