old_experiments:
  lr:
    lr 2e-3 5k warmup:
      train:
        optimizer:
          lr: 2e-3
          n_warmup_steps: 5000
    lr 1e-3:
      train:
        optimizer:
          lr: 1e-3
    lr 1e-4:
      train:
        optimizer:
          lr: 1e-4
    lr 1e-5:
      train:
        optimizer:
          lr: 1e-5
  lr 2:
    lr 5e-4:
      train:
        optimizer:
          lr: 5e-4
    lr 2e-4:
      train:
        optimizer:
          lr: 2e-4
    lr 1e-4:
      train:
        optimizer:
          lr: 1e-4
    lr 8e-5 5k warmup:
      train:
        optimizer:
          lr: 8e-5
    lr 5e-5:
      train:
        optimizer:
          lr: 5e-5
  d mask:
    with d mask:
      model:
        has_input_depth_masks: true
    without d mask:
      model:
        has_input_depth_masks: false
  isolated losses:
    regular:
      train:
        loss:
          weights: [2.0,2.0,0.7,1.5,1.0]
    without i mse:
      train:
        loss:
          weights: [0.0,2.0,0.7,1.5,1.0]
    without i percep:
      train:
        loss:
          weights: [2.0,0.0,0.7,1.5,1.0]
    without d silog:
      train:
        loss:
          weights: [2.0,2.0,0.0,1.5,1.0]
    without d mscale grad:
      train:
        loss:
          weights: [2.0,2.0,0.7,0.0,1.0]
    without d percep:
      train:
        loss:
          weights: [2.0,2.0,0.7,1.0,0.0]
  new dataset:
    old:
      train:
        data:
          datasets:
            wildrgbd:
              path: /media/gabriel/kingston 240gb/wildrgbd/
              dataset_type: raw
    new:
      train:
        data:
          datasets:
            wildrgbd:
              path: /media/gabriel/sandisk_1tb/wildrgbd/
              dataset_type: cones_unconstrained
    new constrained views:
      train:
        data:
          datasets:
            wildrgbd:
              path: /media/gabriel/sandisk_1tb/wildrgbd/
              dataset_type: cones_constrained
  percep loss architecture:
    convnext stand norm:
      train:
        loss:
          weights: [2.0,2.0,0.0,0.0,0.0]
          perceptual:
            type: convnext
            transforms: standardize_normalize
    convnext norm only:
      train:
        loss:
          weights: [2.0,2.0,0.0,0.0,0.0]
          perceptual:
            type: convnext
            transforms: normalize_only
    vgg def:
      train:
        loss:
          weights: [2.0,2.0,0.0,0.0,0.0]
          perceptual:
            type: vgg
            transforms: default
    vgg2 def:
      train:
        loss:
          weights: [2.0,2.0,0.0,0.0,0.0]
          perceptual:
            type: vgg2
            transforms: default
    vgg3 def:
      train:
        loss:
          weights: [2.0,2.0,0.0,0.0,0.0]
          perceptual:
            type: vgg3
            transforms: default
    convnext def:
      train:
        loss:
          weights: [2.0,2.0,0.0,0.0,0.0]
          perceptual:
            type: convnext
            transforms: default
    convnext def 224:
      train:
        loss:
          weights: [2.0,2.0,0.0,0.0,0.0]
          perceptual:
            type: convnext
            transforms: default_size_224
    convnext def 236:
      train:
        loss:
          weights: [2.0,2.0,0.0,0.0,0.0]
          perceptual:
            type: convnext
            transforms: default_size_236
