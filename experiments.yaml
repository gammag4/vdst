overrides:
  model:
    depth_input_type: depth
    enc_layer_norm: false
    enc_residual_layer_norm: false
    dec_layer_norm: false
    dec_residual_layer_norm: false
  train:
    n_steps: 500000

    loss:
      weights: [2.0,2.0,0.7,1.5,1.0]
      perceptual:
        scheduler: constant
    optimizer:
      lr: 1e-4 # For now the best was 1e-4
      n_warmup_steps: 3000

setup:
  out_path: results/experiments/
  total_experiment_steps: [10, 100, 1000, 5000, 10000, 20000]
  use_seed_model: true
  seed_model_steps: 40000
  # Whether to keep older checkpoints saved or to delete them when a newer one is saved
  delete_last_checkpoint: true

