overrides:
  model:
    has_input_depths: true
    has_input_depth_masks: true
    enc_layer_norm: false
    enc_residual_layer_norm: false
    dec_layer_norm: false
    dec_residual_layer_norm: false
    standardize_inputs: false
  train:
    val_steps_interval: 50
    n_steps: 500000

    loss:
      weights: [2.0,2.0,0.7,1.5,1.0]
      perceptual:
        scheduler: constant
    optimizer:
      lr: 1e-4 # For now the best was 1e-4
      n_warmup_steps: 3000

setup:
  out_path: results/experiments/
  total_experiment_steps: 30000

# Compute how much more computation is needed when comparing two models:
# compare_models = lambda d_model_1, n_tokens_1, d_model_2, n_tokens_2: (lambda x, a, b: x(*a) / x(*b))(lambda n, d: (n + d) * (n * d), (d_model_1, n_tokens_1), (d_model_2, n_tokens_2))
# e.g.: compare_models(768, (256//8) ** 2, 16, (64//1) ** 2) = 5.23 (first model is 5x slower than second)
